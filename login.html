<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login University MPM</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    body, html {
      height: 100%;
      width: 100%;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .left {
      flex: 1;
      background-color: #f1f1f1;
    }

    .right {
      flex: 1;
      background-color: #e6f0ff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .header-box {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      width: 110px;
      margin-bottom: 10px;
    }

    .header-box h2 {
      color: #003366;
      margin-bottom: 5px;
    }

    .header-box p {
      color: #666;
      font-size: 14px;
    }

    .form-box {
      background: white;
      border-radius: 10px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .form-header {
      text-align: left;
      margin-bottom: 20px;
    }

    .form-header h1 {
      font-size: 22px;
      color: #003366;
    }

    .form-header p {
      font-size: 14px;
      color: #666;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
      color: #003366;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .forgot {
      text-align: right;
      margin: 10px 0;
    }

    .forgot a {
      font-size: 13px;
      color: #0d6efd;
      text-decoration: none;
    }

    .forgot a:hover {
      text-decoration: underline;
    }

    .btn {
      background-color: #0d6efd;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .btn:hover {
      background-color: #0b5ed7;
    }

    .footer-text {
      font-size: 13px;
      margin-top: 15px;
      text-align: center;
    }

    .footer-text a {
      color: #0d6efd;
      text-decoration: none;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    @media screen and (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .left, .right {
        flex: unset;
        width: 100%;
        height: auto;
      }

      .form-header {
        text-align: center;
      }

      .forgot {
        text-align: center;
      }
    }
  </style>
</head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<body>
  <div class="container">
    <div class="left">
      <!-- Espacio reservado para futura integración -->
    </div>

    <div class="right">
      <!-- Encabezado fuera del formulario -->
      <div class="header-box">
        <img src="img/logo.png" alt="Logo" class="logo" />
        <h2>Bienvenido University MPM</h2>
        <p>Inicia sesión para continuar</p>
      </div>

      <!-- Cuadro del formulario -->
      <div class="form-box">
        <div class="form-header">
          <h1>Iniciar Sesión</h1>
          <p>Ingresa tus credenciales para acceder al sistema</p>
        </div>

        <form>
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" placeholder="0000000" required />

          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="**********" required />
          

          <div class="forgot">
            <a href="#">¿Olvidaste tu contraseña?</a>
          </div>

          <button type="submit" class="btn">Iniciar Sesión</button>
        </form>

        <div class="footer-text">
          <p>¿No tienes cuenta? <a href="#">Contacta al administrador</a></p>
          <br>
          <p>© 2025 University MPM. Todos los derechos reservados.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
